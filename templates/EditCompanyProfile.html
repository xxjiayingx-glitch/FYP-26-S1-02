<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Company Profile</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_dashboard.css') }}">
</head>

<body>

<header class="topbar">
    <div class="brand">Daily Scoop News System</div>

    <div class="top-right">
        <div class="avatar-top">
            <img src="{{ url_for('static', filename='images/profile/default.png') }}">
        </div>

        <span>Hi, {{ session['username'] }}</span>
        <a href="/logout">Logout</a>
    </div>
</header>

<div class="layout">

<!-- ⭐ SIDEBAR -->
<aside class="sidebar" id="sidebar">

    <div class="profile-box">
        <div class="avatar-wrapper">
            <div class="avatar">
                <img src="{{ url_for('static', filename='images/profile/default.png') }}">
            </div>
        </div>

        <div class="profile-info">
            <div class="username">{{ session['username'] }}</div>
            <div class="role">System Admin</div>
        </div>
    </div>

    <nav class="menu">

        <a href="{{ url_for('admin_dashboard.admin_dashboard') }}">
            <span class="menu-text">Dashboard</span>
        </a>

        <a href="/admin/user-accounts">
            <span class="menu-text">User Accounts</span>
        </a>

        <a href="/admin/article-reported">
            <span class="menu-text">Article Reported</span>
        </a>

        <a href="/admin/category-management">
            <span class="menu-text">Category Management</span>
        </a>

        <a href="/admin/webpage-management" class="active">
            <span class="menu-text">Webpage Management</span>
        </a>

        <a href="/admin/system-monitoring">
            <span class="menu-text">System Monitoring</span>
        </a>

        <a href="/admin/auto-publish-rules">
            <span class="menu-text">Auto-Publish Rules</span>
        </a>

    </nav>

</aside>


<!-- ⭐ MAIN -->
<main class="content">

<button class="hamburger" id="toggleSidebar">☰</button>

<h1>Edit Company Profile Section</h1>

<div class="card form-card">

    <div class="form-group">
        <label>Company Name</label>
        <input id="companyName">
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea id="description"></textarea>
    </div>

    <div class="form-group">
        <label>Mission</label>
        <textarea id="mission"></textarea>
    </div>

    <div class="form-group">
        <label>Vision</label>
        <textarea id="vision"></textarea>
    </div>

    <div class="form-group">
        <label>Contact Email</label>
        <input id="contactEmail">
    </div>

    <div class="form-group">
        <label>Contact Phone</label>
        <input id="contactPhone">
    </div>

    <div style="margin-top:30px;">
        <button class="secondary-btn"
            onclick="window.location.href='/admin/webpage-management'">
            Cancel
        </button>

        <button class="primary-btn"
            onclick="saveCompanyProfile()">
            Save Changes
        </button>
    </div>

</div>

</main>

</div>

<script>

const toggleButton = document.getElementById("toggleSidebar");
const sidebar = document.getElementById("sidebar");

toggleButton.addEventListener("click", function () {
    sidebar.classList.toggle("collapsed");
});


window.onload = loadCompanyProfile;

function loadCompanyProfile(){
    fetch("/admin/company-profile")
    .then(res => res.json())
    .then(data => {
        companyName.value = data.companyName || "";
        description.value = data.description || "";
        mission.value = data.mission || "";
        vision.value = data.vision || "";
        contactEmail.value = data.contactEmail || "";
        contactPhone.value = data.contactPhone || "";
    });
}

function saveCompanyProfile(){
    fetch("/admin/company-profile",{
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            companyName: companyName.value,
            description: description.value,
            mission: mission.value,
            vision: vision.value,
            contactEmail: contactEmail.value,
            contactPhone: contactPhone.value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        window.location.href="/admin/webpage-management";
    })
}

</script>

</body>
</html>
