{% extends "admin_base.html" %}
{% block webpage_active %}active{% endblock %}
{% block content %}
<style>
    .features-breadcrumb-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
    }

    .features-breadcrumb {
        font-size: 15px;
        color: #2a7db8;
    }

    .features-breadcrumb a {
        color: #2a7db8;
        text-decoration: none;
    }

    .features-breadcrumb span {
        color: #555;
        margin: 0 4px;
    }
</style>

<div class="features-breadcrumb-row">
    <div class="features-breadcrumb">
        <a href="/admin/webpage-management">Webpage Management</a>
        <span>/</span>
        <span>Edit Company Profile</span>
    </div>
</div>

<div class="page-header">
  <h1>Edit Company Profile</h1>
</div>

<div class="page-wrapper">
    <div class="form-card-large">

        <div class="form-row">
            <label>Company Name</label>
            <input id="companyName" class="input-modern">
        </div>

        <div class="form-row">
            <label>Description</label>
            <textarea id="description" class="input-modern"></textarea>
        </div>

        <div class="form-row">
            <label>Mission</label>
            <textarea id="mission" class="input-modern"></textarea>
        </div>

        <div class="form-row">
            <label>Vision</label>
            <textarea id="vision" class="input-modern"></textarea>
        </div>

        <div class="form-row two-col">
            <div>
                <label>Contact Email</label>
                <input id="contactEmail" class="input-modern" type="email">
            </div>

            <div>
                <label>Contact Phone</label>
                <input id="contactPhone" class="input-modern">
            </div>
        </div>

        <div class="form-actions">

            <button
                type="button"
                class="btn-secondary"
                onclick="window.location.href='/admin/webpage-management'">
                Cancel
            </button>

            <button
                type="button"
                class="btn-primary"
                onclick="saveCompanyProfile()">
                Save Changes
            </button>

        </div>

    </div>

</div>

<script>

window.onload = loadCompanyProfile;

function loadCompanyProfile(){

    fetch("/admin/company-profile")
    .then(res=>{
        if(!res.ok){
            throw new Error("Failed to load profile");
        }
        return res.json();
    })
    .then(data => {

        document.getElementById("companyName").value = data.companyName || "";
        document.getElementById("description").value = data.description || "";
        document.getElementById("mission").value = data.mission || "";
        document.getElementById("vision").value = data.vision || "";
        document.getElementById("contactEmail").value = data.contactEmail || "";
        document.getElementById("contactPhone").value = data.contactPhone || "";

    })
    .catch(err=>{
        console.error(err);
        alert("Failed to load company profile");
    });
}

function saveCompanyProfile(){

    const companyName = document.getElementById("companyName").value.trim();
    const description = document.getElementById("description").value.trim();
    const mission = document.getElementById("mission").value.trim();
    const vision = document.getElementById("vision").value.trim();
    const contactEmail = document.getElementById("contactEmail").value.trim();
    const contactPhone = document.getElementById("contactPhone").value.trim();

    if (!companyName) {
        alert("Company name cannot be empty");
        document.getElementById("companyName").focus();
        return;
    }

    if (!description) {
        alert("Description cannot be empty");
        document.getElementById("description").focus();
        return;
    }

    if (!mission) {
        alert("Mission cannot be empty");
        document.getElementById("mission").focus();
        return;
    }

    if (!vision) {
        alert("Vision cannot be empty");
        document.getElementById("vision").focus();
        return;
    }

    if (!contactEmail) {
        alert("Contact email cannot be empty");
        document.getElementById("contactEmail").focus();
        return;
    }

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailPattern.test(contactEmail)) {
        alert("Please enter a valid email address");
        document.getElementById("contactEmail").focus();
        return;
    }

    if (!contactPhone) {
        alert("Contact phone cannot be empty");
        document.getElementById("contactPhone").focus();
        return;
    }

    fetch("/admin/company-profile",{
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            companyName: companyName,
            description: description,
            mission: mission,
            vision: vision,
            contactEmail: contactEmail,
            contactPhone: contactPhone
        })
    })
    .then(res => res.json().then(data => ({
        ok: res.ok,
        data: data
    })))
    .then(result => {

        if (!result.ok) {
            alert(result.data.message || "Update failed");
            return;
        }

        alert(result.data.message || "Company profile updated successfully");

        // Stay on same page
        loadCompanyProfile();
    })
    .catch(err=>{
        console.error(err);
        alert("Failed to save changes");
    });

}

</script>

{% endblock %}
