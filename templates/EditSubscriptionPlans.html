{% extends "admin_base.html" %}
{% block webpage_active %}active{% endblock %}
{% block content %}
<style>
    .features-breadcrumb-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
    }

    .features-breadcrumb {
        font-size: 15px;
        color: #2a7db8;
    }

    .features-breadcrumb a {
        color: #2a7db8;
        text-decoration: none;
    }

    .features-breadcrumb span {
        color: #555;
        margin: 0 4px;
    }
</style>

<div class="features-breadcrumb-row">
    <div class="features-breadcrumb">
        <a href="/admin/webpage-management">Webpage Management</a>
        <span>/</span>
        <span>Edit Subscription Plans</span>
    </div>
</div>

<div class="page-header">
    <h1>Edit Subscription Plans</h1>
</div>

<div class="page-wrapper">
    
    <!-- PLAN SWITCHER -->
    <div class="plan-toolbar">
        <div class="form-row plan-select-group">
            <label>Select Plan</label>
            <form method="GET" action="{{ url_for('edit_subscription_plans_bp.edit_subscription_plans_page') }}">
                <select 
                    name="planID"
                    class="input-modern"
                    onchange="this.form.submit()"
                >
                    {% for p in plans %}
                    <option value="{{ p.planID }}" {% if selected_plan_id == p.planID %}selected{% endif %}>
                        {{ p.planName }}
                    </option>
                    {% endfor %}
                </select>
            </form>
        </div>

        <button type="button" class="btn-primary" onclick="prepareNewPlan()">
            + Add New Plan
        </button>
    </div>

    <div class="form-card-large">

        <!-- PLAN NAME -->
        <div class="form-row">
            <label>Plan Name</label>
            <input 
                id="planName"
                class="input-modern"
                type="text"
                value="{{ plan.planName if plan else '' }}"
            >
        </div>

        <!-- DESCRIPTION -->
        <div class="form-row">
            <label>Plan Description</label>
            <textarea 
                id="planDescription"
                class="textarea-modern form-textarea"
                placeholder="Short description shown below the price"
            >{{ plan.planDescription if plan else '' }}</textarea>
        </div>

        <!-- PLAN FEATURES -->
        <div class="form-row">
            <label>Plan Features</label>
            <textarea 
                id="planFeatures"
                class="textarea-modern form-textarea"
                placeholder="Enter features separated by commas"
            >{{ plan.planFeatures if plan else '' }}</textarea>
        </div>

        <!-- PRICE + BILLING -->
        <div class="two-col">

            <div class="form-row" style="flex:1;">
                <label>Price</label>
                <input 
                    id="price"
                    class="input-modern"
                    type="number"
                    step="0.01"
                    value="{{ plan.price if plan else '' }}"
                >
            </div>

            <div class="form-row" style="flex:1;">
                <label>Billing Cycle</label>
                <input 
                    id="billingCycle"
                    class="input-modern"
                    type="text"
                    value="{{ plan.billingCycle if plan else '' }}"
                >
            </div>

        </div>

        <!-- STATUS -->
        <div class="form-row">
            <label>Plan Status</label>
            <select 
                id="planStatus"
                class="input-modern"
            >
                <option value="active" {% if plan and plan.planStatus == "active" %}selected{% endif %}>Active</option>
                <option value="inactive" {% if plan and plan.planStatus == "inactive" %}selected{% endif %}>Inactive</option>
            </select>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="window.history.back()">
                Cancel
            </button>

            <button type="button" class="btn-primary" onclick="savePlan()">
                Save Changes
            </button>
        </div>

    </div>

</div>

<script>
let currentPlanID = {{ plan.planID if plan else 'null' }};

function prepareNewPlan() {
    currentPlanID = null;

    document.getElementById("planName").value = "";
    document.getElementById("planDescription").value = "";
    document.getElementById("planFeatures").value = "";
    document.getElementById("price").value = "";
    document.getElementById("billingCycle").value = "month";
    document.getElementById("planStatus").value = "active";
}

async function savePlan() {
    const payload = {
        planID: currentPlanID,
        planName: document.getElementById("planName").value.trim(),
        planDescription: document.getElementById("planDescription").value.trim(),
        planFeatures: document.getElementById("planFeatures").value.trim(),
        price: document.getElementById("price").value,
        billingCycle: document.getElementById("billingCycle").value.trim(),
        planStatus: document.getElementById("planStatus").value
    };

    const method = currentPlanID ? "PUT" : "POST";

    const res = await fetch("/admin/subscription-plan", {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (res.ok) {
        alert(result.message || "Saved Successfully");
        location.reload();
    } else {
        alert(result.message || "Failed to Save");
    }
}
</script>

{% endblock %}
