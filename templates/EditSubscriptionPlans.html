{% extends "admin_base.html" %}
{% block content %}

<div class="page-wrapper">

    <h1 class="page-title">Edit Subscription Plans</h1>

    <!-- PLAN SWITCHER -->
    <div class="form-row" style="max-width: 260px; margin-bottom: 24px;">
        <label>Select Plan</label>
        <form method="GET" action="{{ url_for('edit_subscription_plans_bp.edit_subscription_plans_page') }}">
            <select 
            name="planID"
            class="input-modern"
            onchange="this.form.submit()"
        >
               <option value="8" {% if selected_plan_id == 8 %}selected{% endif %}>Free Plan</option>
               <option value="9" {% if selected_plan_id == 9 %}selected{% endif %}>Premium Plan</option>
            </select>
        </form>
    </div>

    <div class="form-card-large">

        <!-- PLAN NAME -->
        <div class="form-row">
            <label>Plan Name</label>
            <input 
                id="planName"
                class="input-modern"
                type="text"
                value="{{ plan.planName if plan else '' }}"
            >
        </div>

        <!-- DESCRIPTION -->
        <div class="form-row">
            <label>Plan Description</label>
            <textarea 
                id="planDescription"
                class="textarea-modern form-textarea"
            >{{ plan.planDescription if plan else '' }}</textarea>
        </div>

        <!-- PRICE + BILLING -->
        <div class="two-col">

            <div class="form-row" style="flex:1;">
                <label>Price</label>
                <input 
                    id="price"
                    class="input-modern"
                    type="number"
                    step="0.01"
                    value="{{ plan.price if plan else '' }}"
                >
            </div>

            <div class="form-row" style="flex:1;">
                <label>Billing Cycle</label>
                <input 
                    id="billingCycle"
                    class="input-modern"
                    type="text"
                    value="{{ plan.billingCycle if plan else '' }}"
                >
            </div>

        </div>

        <!-- STATUS -->
        <div class="form-row">
            <label>Plan Status</label>
            <select 
                id="planStatus"
                class="input-modern"
            >
                <option value="Active" {% if plan and plan.planStatus == "active" %}selected{% endif %}>Active</option>
                <option value="Inactive" {% if plan and plan.planStatus == "inactive" %}selected{% endif %}>Inactive</option>
            </select>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="window.history.back()">
                Cancel
            </button>

            <button type="button" class="btn-primary" onclick="savePlan()">
                Save Changes
            </button>
        </div>

    </div>

</div>

<script>
const currentPlanID = {{ plan.planID if plan else 'null' }};

async function savePlan(){

    const payload = {
        planID: currentPlanID,
        planName: document.getElementById("planName").value,
        planDescription: document.getElementById("planDescription").value,
        price: document.getElementById("price").value,
        billingCycle: document.getElementById("billingCycle").value,
        planStatus: document.getElementById("planStatus").value
    };

    const res = await fetch("/admin/subscription-plan", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    if(res.ok){
        alert("Saved Successfully");
    }else{
        alert("Failed to Save");
    }
}
</script>

{% endblock %}
