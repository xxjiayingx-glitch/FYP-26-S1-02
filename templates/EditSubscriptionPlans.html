{% extends "admin_base.html" %}
{% block content %}

<div class="page-wrapper">

    <h1 class="page-title">Edit Subscription Plans</h1>

    <div class="form-card-large">

        <!-- PLAN NAME -->
        <div class="form-row">
            <label>Plan Name</label>
            <input 
                id="planName"
                class="input-modern"
                type="text"
            >
        </div>

        <!-- DESCRIPTION -->
        <div class="form-row">
            <label>Plan Description</label>
            <textarea 
                id="planDescription"
                class="textarea-modern form-textarea"
            ></textarea>
        </div>

        <!-- PRICE + BILLING -->
        <div class="two-col">

            <div class="form-row" style="flex:1;">
                <label>Price</label>
                <input 
                    id="price"
                    class="input-modern"
                    type="number"
                >
            </div>

            <div class="form-row" style="flex:1;">
                <label>Billing Cycle</label>
                <input 
                    id="billingCycle"
                    class="input-modern"
                    type="text"
                >
            </div>

        </div>

        <!-- STATUS -->
        <div class="form-row">
            <label>Plan Status</label>
            <select 
                id="planStatus"
                class="input-modern"
            >
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
            </select>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="form-actions">
            <button class="btn-secondary" onclick="window.history.back()">
                Cancel
            </button>

            <button class="btn-primary" onclick="savePlan()">
                Save Changes
            </button>
        </div>

    </div>

</div>

<script>

async function loadPlan(){

    const res = await fetch("/admin/subscription-plan")
    const data = await res.json()

    if(!data) return

    document.getElementById("planName").value = data.planName || ""
    document.getElementById("planDescription").value = data.planDescription || ""
    document.getElementById("price").value = data.price || ""
    document.getElementById("billingCycle").value = data.billingCycle || ""
    document.getElementById("planStatus").value = data.planStatus || "Active"

}

async function savePlan(){

    const payload = {
        planName: document.getElementById("planName").value,
        planDescription: document.getElementById("planDescription").value,
        price: document.getElementById("price").value,
        billingCycle: document.getElementById("billingCycle").value,
        planStatus: document.getElementById("planStatus").value
    }

    const res = await fetch("/admin/subscription-plan",{
        method:"PUT",
        headers:{ "Content-Type":"application/json"},
        body: JSON.stringify(payload)
    })

    if(res.ok){
        alert("Saved Successfully")
    }else{
        alert("Failed to Save")
    }

}

loadPlan()

</script>

{% endblock %}
