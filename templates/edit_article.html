{% extends "master.html" %}

{% block content %}
<div class="create-article-container" style="max-width: 800px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px;">
    <h2>Edit Article</h2>
    <form method="POST" enctype="multipart/form-data">
        <!-- Title -->
        <div style="margin-bottom: 15px;">
            <label for="title"><strong>Title:</strong></label><br>
            <input type="text" id="title" name="title" value="{{ article.articleTitle }}" required style="width: 100%; padding: 8px;"/>
        </div>

        <!-- Category -->
        <div style="margin-bottom: 15px;">
            <label for="category"><strong>Category:</strong></label><br>
            <select id="category" name="category" required style="width: 100%; padding: 8px;">
                {% for cat in categories %}
                    <option value="{{ cat.categoryID }}" {% if article.categoryID == cat.categoryID %}selected{% endif %}>
                        {{ cat.categoryName }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Content -->
        <div style="margin-bottom: 15px;">
            <label for="content"><strong>Content:</strong></label><br>
            <textarea id="content" name="content" rows="10" required style="width: 100%; padding: 8px;">{{ article.content }}</textarea>
        </div>

        <!-- Featured Image -->
        <div style="margin-bottom: 15px;">
            <label for="featured_image"><strong>Upload Featured Image:</strong></label><br>
            <input type="file" id="featured_image" name="featured_image" accept="image/*"/>
        </div>

        <!-- Status -->
        <div style="margin-bottom: 15px;">
            <label for="status"><strong>Status:</strong></label><br>
            <select id="status" name="status" required style="width: 100%; padding: 8px;">
                <option value="draft" {% if article.articleStatus == 'draft' %}selected{% endif %}>Draft</option>
                <option value="published" {% if article.articleStatus == 'published' %}selected{% endif %}>Published</option>
            </select>
        </div>

        <!-- Buttons -->
        <div style="margin-top: 20px;">
            <a href="{{ url_for('my_articles') }}" class="btn-cancel" style="padding: 10px 20px; margin-right: 10px; background: #ccc; color: black; text-decoration: none; border-radius: 5px;">Cancel</a>
            <button type="submit" style="padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px;">Update</button>
        </div>
    </form>
</div>
{% endblock %}
