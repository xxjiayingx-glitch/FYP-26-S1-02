{% extends "master.html" %}

{% block title %}Create Article{% endblock %}

{% block content %}
<div class="create-article-page">
    <div class="create-article-card">
        <h1 class="create-article-title">Create Your Own Article</h1>

        <form method="POST" enctype="multipart/form-data" class="create-article-form">
            
            <!-- Title -->
            <div class="create-form-row">
                <label for="title">Title:</label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    required
                    placeholder="Enter your article title"
                    value="{{ request.form.title or '' }}"
                >
            </div>

            <!-- Category -->
            <div class="create-form-row">
                <label for="category">Category:</label>
                <select id="category" name="category" required>
                    <option value="" disabled {% if not request.form.category %}selected{% endif %}>
                        Select your article category
                    </option>
                    {% for cat in categories %}
                        <option 
                            value="{{ cat.categoryID }}"
                            {% if request.form.category == cat.categoryID|string %}selected{% endif %}
                        >
                            {{ cat.categoryName }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Content -->
            <div class="create-form-row">
                <label for="content">Content:</label>
                <textarea 
                    id="content" 
                    name="content" 
                    rows="12" 
                    required
                    placeholder="Enter your full article content"
                >{{ request.form.content or '' }}</textarea>
            </div>

            <!-- Featured Image -->
            <div class="create-form-row">
                <label for="featured_image">Upload Featured Image:</label>
                <input 
                    type="file" 
                    id="featured_image" 
                    name="featured_image" 
                    accept="image/*"
                    required
                >
            </div>

            <!-- AI Fact Check Score -->
            <div class="create-form-row">
                <label for="ai_score">AI Fact Checking Score:</label>
                <input 
                    type="text" 
                    id="ai_score" 
                    name="ai_score"
                    class="ai-score-input"
                    placeholder="This score will be generated automatically by AI after submission"
                    value="{{ ai_score if ai_score is defined else '' }}"
                    readonly
                >
                <small class="field-note">
                    This score is automatically generated by the AI fact-checking system.
                </small>
            </div>


            <!-- Buttons -->
            <div class="create-form-actions">
                <a href="{{ url_for('my_articles') }}" class="create-btn cancel-create-btn">
                    Cancel
                </a>

                <button type="submit" class="create-btn draft-create-btn" name="submit_action" value="draft">
                    Draft
                </button>

                <button type="submit" class="create-btn publish-create-btn" name="submit_action" value="published">
                    Published
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
