<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Editor Panel{% endblock %}</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: #f4f6f9;
            color: #222;
        }

        /* REMOVE ALL UNDERLINES */
        a {
            text-decoration: none;
            color: inherit;
        }

        /* ===== TOP NAVBAR ===== */
        .topbar{
            background:#c4def4;
            min-height:80px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 42px;
            gap:30px;
            border-bottom:1px solid rgba(0,0,0,0.06);
        }

        .brand{
            font-weight:900;
            font-size:32px;
            line-height:1;
            color:#1f3a5f;
            cursor:pointer;
            letter-spacing:-0.5px;
            text-decoration: none;
            transition: all 0.3s ease;  
        }
        
        .brand:hover{
            color:#3f8ec4;   /* lighter blue glow */
            text-decoration: none;

            text-shadow:
                0 0 6px rgba(63,142,196,0.35),
                0 0 12px rgba(63,142,196,0.25);

            transform: scale(1.03);
        }

        .brand:active{
            transform: scale(0.98);
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .user-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e3d9ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logout {
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .logout:hover {
            background: rgba(0,0,0,0.08);
        }

        /* ===== MAIN LAYOUT ===== */
        .layout {
            display: flex;
            min-height: calc(100vh - 70px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 240px;
            background: #ffffff;
            border-right: 1px solid #e6e9ef;
            padding: 20px 15px;
        }

        .profile-box {
            background: #f2f4f8;
            padding: 15px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #e3d9ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-name {
            font-weight: 700;
        }

        .profile-role {
            font-size: 13px;
            color: #666;
        }

        /* NAV */
        .nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav a {
            padding: 12px 14px;
            border-radius: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .nav a:hover {
            background: #f1f4f8;
        }

        .nav a.active {
            background: #e9edf3;
        }

        .nav i {
            width: 18px;
        }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            padding: 30px;
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="brand">
            <a href="{{ url_for('editor_dashboard') }}">
                Daily Scoop<br>
                News System
            </a>
        </div>

        <div class="top-right">
            <div class="user-box">
                <div class="user-icon">
                    <i class="fa-regular fa-user"></i>
                </div>
                <span>Hi, {{ session.username }}</span>
            </div>

            <a href="{{ url_for('logout') }}" class="logout">
                Logout
            </a>
        </div>
    </div>

    <!-- MAIN -->
    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="profile-box">
                <div class="profile-avatar">
                    <i class="fa-regular fa-user"></i>
                </div>

                <div>
                    <div class="profile-name">{{ session.username }}</div>
                    <div class="profile-role">Editor</div>
                </div>
            </div>

            <div class="nav">
                <a href="/editor/dashboard"
                   class="{% if active_page == 'dashboard' %}active{% endif %}">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>

                <a href="{{ url_for('editor_category_articles') }}"
                   class="{% if active_page == 'category' %}active{% endif %}">
                    <i class="fa-solid fa-layer-group"></i> Category Articles
                </a>

                 <a href="{{ url_for('editor_my_articles') }}"
                   class="{% if active_page == 'my_articles' %}active{% endif %}">
                    <i class="fa-solid fa-pen"></i> My Posted Articles
                </a>

                <a href="{{ url_for('editor_approval_articles') }}"
                class="{% if active_page == 'approval' %}active{% endif %}">
                    <i class="fa-solid fa-clipboard-check"></i> Approval Articles
                </a>

                <a href="/editor/article-reported"
                class="{% if active_page == 'reported' %}active{% endif %}">
                    <i class="fa-solid fa-flag"></i> Articles Reported
                </a>

                <a href="{{ url_for('editor_manage_profile') }}"
                    class="{% if active_page == 'profile' %}active{% endif %}">
                        <i class="fa-solid fa-user-cog"></i> Manage My Profile
                </a>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </div>

</body>
</html>
