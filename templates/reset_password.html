{% extends "master.html" %}
{% block content %}

<style>
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    padding: 60px 16px;
  }

  .login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(255, 255, 255, 0.95);
    padding: 45px 35px;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    text-align: center;
  }

  .login-card h2 {
    font-size: 30px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #1f3a5f;
  }

  .login-card form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: left;
  }

  .login-card label {
    font-size: 14px;
    font-weight: 500;
    color: #1f3a5f;
  }

  .login-card input {
    width: 100%;
    padding: 16px 4px;
    border: 1.5px solid #1f3a5f;
    border-radius: 12px;
    font-size: 15px;
    box-sizing: border-box;
  }

  .login-card input:focus {
    border-color: #2a5bd7;
    box-shadow: 0 0 6px rgba(42, 91, 215, 0.3);
    outline: none;
    background-color: #f0f7fc;
  }

  .login-btn {
    width: 100%;
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(90deg, #2d5a1b, #3c7e2b);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
  }

  .login-btn:hover {
    background: linear-gradient(90deg, #1e3d12, #2d5a1b);
    transform: translateY(-2px);
  }

  .back-to-login {
    margin-top: 20px;
    font-size: 14px;
    color: #555;
    text-align: center;
  }

  .back-to-login a {
    color: #2a5bd7;
    font-weight: 600;
    text-decoration: none;
  }

  .back-to-login a:hover {
    text-decoration: underline;
  }

  /* Modal styles */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
  }

  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 40px 50px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    border-left: 6px solid #dc3545;
    cursor: default;
  }

  .modal-box p {
    font-size: 18px;
    color: #333;
    margin: 0 0 10px 0;
  }

  /* Show/Hide toggle */
  .password-wrapper {
    position: relative;
    width: 100%;
  }

  .password-wrapper input {
    padding-right: 76px;
  }

  .toggle-password-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: transparent;
    color: #2a5bd7;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .toggle-password-btn:hover {
    color: #1e3d7a;
    text-decoration: underline;
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <h2>Reset Password</h2>
    {% if error %}
    <div class="modal-overlay" id="modalOverlay" data-url="{{ url_for('login.forgot_password') }}">
      <div class="modal-box" onclick="event.stopPropagation()">
        <p>{{ error }}</p>
      </div>
    </div>

    <script>
      document.getElementById('modalOverlay').addEventListener('click', function() {
        window.location.href = this.getAttribute('data-url');
      });
    </script>
    {% endif %}

    <form method="POST" action="{{ url_for('login.reset_password', token=token) }}">
      <label>New Password</label>
      <div class="password-wrapper">
        <input type="password" name="new_password" required placeholder="Min 10 characters" minlength="10">
        <button type="button" class="toggle-password-btn" onclick="togglePassword('new_password', this)">Show</button>
      </div>

      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" name="confirm_password" required placeholder="Repeat password" minlength="10">
        <button type="button" class="toggle-password-btn" onclick="togglePassword('confirm_password', this)">Show</button>
      </div>

      <button type="submit" class="login-btn">Reset Password</button>
    </form>

    <div class="back-to-login">
      Back to <a href="{{ url_for('login.login') }}">Login</a>
    </div>
  </div>
</div>

<script>
  function togglePassword(fieldName, btn) {
    const input = document.querySelector(`input[name="${fieldName}"]`);
    if (input.type === "password") {
      input.type = "text";
      btn.textContent = "Hide";
    } else {
      input.type = "password";
      btn.textContent = "Show";
    }
  }
</script>

{% endblock %}
