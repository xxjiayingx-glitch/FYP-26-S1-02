{% extends "admin_base.html" %}
{% block content %}

<div class="category-layout">

    <div class="category-table-card">
        <table class="modern-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="categoryTable"></tbody>
        </table>
    </div>

    <div class="category-form-card">
        <h2>Add New Category</h2>
        <input type="text" id="categoryName" placeholder="Category Name">
        <button type="button" onclick="addCategory()">Add</button>
    </div>

</div>

<script>
function loadCategories() {
    fetch("/admin/categories")
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("categoryTable");
        table.innerHTML = "";

        data.forEach(cat => {
            table.innerHTML += `
                <tr>
                    <td>${cat.categoryID}</td>
                    <td><input id="name-${cat.categoryID}" 
                        value="${cat.categoryName}" 
                        disabled></td>
                    <td><span class="status active">Active</span></td>
                    <td>
                        <button type="button" onclick="editCategory(${cat.categoryID})">Edit</button>
                        <button type="button" onclick="deleteCategory(${cat.categoryID})">Delete</button>
                    </td>
                </tr>
            `;
        });
    })
    .catch(err => {
        console.error("Load categories failed:", err);
    });
}

function addCategory() {

    let input = document.getElementById("categoryName")
    let name = input.value.trim()

    if (!name) {
        alert("Please enter category name")
        input.focus()
        return
    }

    fetch("/admin/category", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            categoryName: name
        })
    })
    .then(async res => {

        if (!res.ok) {

            let text = await res.text()
            console.error("SERVER ERROR:", text)

            alert("Server error while adding category")
            throw new Error("server error")
        }

        return res.json()

    })
    .then(data => {

        alert(data.message)

        input.value = ""

        loadCategories()

    })
    .catch(err => {

        console.error("Add failed:", err)
        alert("Add failed")

    })

}

function editCategory(id){

    let input = document.getElementById(`name-${id}`)
    let button = event.target

    if(button.innerText === "Edit"){

        input.removeAttribute("disabled")
        input.focus()

        button.innerText = "Save"

    }else{

        let newName = input.value.trim()

        fetch(`/admin/category/${id}`,{
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                categoryName:newName
            })
        })
        .then(res=>res.json())
        .then(data=>{
            alert(data.message)
            loadCategories()
        })

    }

}

function deleteCategory(id) {
    if (!confirm("Delete this category?")) return;

    fetch(`/admin/category/${id}`, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadCategories();
    })
    .catch(err => {
        console.error("Delete category failed:", err);
    });
}

document.addEventListener("DOMContentLoaded", function() {
    loadCategories();
});
</script>

{% endblock %}
