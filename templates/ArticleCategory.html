{% extends "admin_base.html" %}
{% block content %}

<style>

/* ================= PAGE ================= */
.category-page{
    width:100%;
    box-sizing:border-box;
}

.category-page .page-title{
    font-size:28px;
    font-weight:800;
    color:#111;
    margin-bottom:26px;
}

/* ================= LAYOUT ================= */

.category-layout{
    display:flex;
    gap:28px;
    padding:30px;
    width:100%;
    box-sizing:border-box;
}

/* ================= TABLE CARD ================= */

.category-table-card{
    flex:1;
    background:white;
    border-radius:22px;
    padding:30px 32px;
    box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

/* ================= TABLE ================= */

.modern-table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}


.modern-table th{
    font-size:18px;
    font-weight:700;
    padding-bottom:10px;
}


.modern-table th:nth-child(1),
.modern-table td:nth-child(1){
    width:10%;
    text-align:left;
    padding-left:4px;
}

.modern-table th:nth-child(2),
.modern-table td:nth-child(2){
    width:46%;
    text-align:left;
}

.modern-table th:nth-child(3),
.modern-table td:nth-child(3){
    width:18%;
    text-align:center;
}

.modern-table th:nth-child(4),
.modern-table td:nth-child(4){
    width:26%;
    text-align:left;
}

/* ================= ROW ================= */

.modern-table td{
    padding:22px 6px;
    border-bottom:1px solid #f1f2f4;
    vertical-align:middle;
    font-size:16px;
    font-weight:500;
}

.modern-table td:nth-child(1){
    padding-left:2px;
}

/* ================= NAME INPUT ================= */

.modern-table input{
    width:78%;
    max-width:320px;

    padding:14px 18px;
    font-size:16px;
    font-weight:600;

    border-radius:14px;
    border:none;
    background:#f2f3f5;
    transition:.25s;
}

/* ================= STATUS ================= */

.status{
    background:#7ED957;
    padding:8px 18px;
    border-radius:999px;
    font-weight:700;
    font-size:16px;
    display:inline-block;
}

/* ================= ACTION ================= */

.modern-table td:nth-child(4){
    white-space:nowrap;
}

.action-wrap{
    display:flex;
    align-items:center;
    gap:12px;
}

.action-wrap button{
    padding:8px 18px;
    border-radius:999px;
    font-weight:700;
    font-size:16px;
    border:none;
    cursor:pointer;
    transition:.2s;
}

.action-wrap button:first-child{
    background:#e6e6e6;
    color:#222;
}

.action-wrap button:last-child{
    background:#ff5a5f;
    color:white;
}

.action-wrap button:first-child:hover{
    background:#4A6CF7;
    color:white;
}

.action-wrap button:last-child:hover{
    background:#e13c41;
}

/* ================= RIGHT FORM ================= */

.category-form-card{
    width:320px;
    background:white;
    border-radius:22px;
    padding:30px;
    box-shadow:0 12px 30px rgba(0,0,0,0.06);
    text-align:center;
    margin-bottom: auto;
}

.category-form-card h2{
    font-size:22px;
    font-weight:800;
    margin-bottom:24px;
}

.category-form-card input{
    width:100%;
    padding:16px;
    border-radius:16px;
    border:none;
    background:#f2f3f5;
    font-size:16px;
    margin-bottom:28px;
}

/* .category-input {
    margin-bottom:18px;
} */

.category-form-card button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#5b73ea,#4A6CF7);
    color:white;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
}

</style>

<div class="category-page">
    <h1 class="page-title">Article Category Management</h1>

    <div class="category-layout">

        <div class="category-table-card">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="categoryTable"></tbody>
            </table>
        </div>

        <div class="category-form-card">
            <h2>Add New Category</h2>
            <input type="text" class="category-input" id="categoryName" placeholder="Category Name">
            <button type="button" onclick="addCategory()">Add</button>
        </div>

    </div>
</div>

<script>
function loadCategories() {
    fetch("/admin/categories")
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("categoryTable");
        table.innerHTML = "";

        data.forEach(cat => {
            table.innerHTML += `
                <tr>
                    <td>${cat.categoryID}</td>
                    <td><input id="name-${cat.categoryID}" 
                        value="${cat.categoryName}" 
                        disabled></td>
                    <td><span class="status active">Active</span></td>
                    <td>
                        <div class="action-wrap">
                            <button class="edit-btn" type="button"
                            onclick="editCategory(${cat.categoryID}, this)">Edit</button>
                            
                            <button class="delete-btn" type="button"
                            onclick="deleteCategory(${cat.categoryID})">Delete</button>
                        </div>
                    </td>
                </tr>
            `;
        });
    })
    .catch(err => {
        console.error("Load categories failed:", err);
    });
}

async function addCategory() {

    let input = document.getElementById("categoryName")
    let name = input.value.trim()

    if (!name) {
        alert("Please enter category name")
        input.focus()
        return
    }

    try {
        const res = await fetch("/admin/category", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                categoryName: name
            })
        })

        const data = await res.json()

        if (!res.ok) {
            alert(data.message)
            return
        }

        alert(data.message)
        input.value = ""
        loadCategories()

    } catch (err) {
        console.error("Add category failed:", err)
        alert("Unable to add category. Please try again.")
    }
}

async function editCategory(id, button) {

    let input = document.getElementById(`name-${id}`)

    if (button.innerText === "Edit") {

        // Save original value before editing
        input.setAttribute("data-original", input.value)

        input.removeAttribute("disabled")
        input.focus()
        button.innerText = "Save"

    } else {

        let newName = input.value.trim()

        if (!newName) {
            alert("Category name cannot be empty")
            input.focus()
            return
        }

        try {
            const res = await fetch(`/admin/category/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    categoryName: newName
                })
            })

            const data = await res.json()

            if (!res.ok) {
                alert(data.message)

                // Reset UI because update failed
                input.value = input.getAttribute("data-original")
                input.setAttribute("disabled", true)
                button.innerText = "Edit"

                return
            }

            alert(data.message)
            loadCategories()

        } catch (err) {
            console.error("Update category failed:", err)
            alert("Unable to update category. Please try again.")

            // Reset UI because unexpected error happened
            input.value = input.getAttribute("data-original")
            input.setAttribute("disabled", true)
            button.innerText = "Edit"
        }
    }
}

function deleteCategory(id) {
    if (!confirm("Delete this category?")) return;

    fetch(`/admin/category/${id}`, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadCategories();
    })
    .catch(err => {
        console.error("Delete category failed:", err);
    });
}

document.addEventListener("DOMContentLoaded", function() {
    loadCategories();
});
</script>

{% endblock %}
