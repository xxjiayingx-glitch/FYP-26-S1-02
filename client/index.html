<!doctype html>
<html>
  <body>
    <button onclick="loadUsers()">Load Users</button>

    <ul id="users"></ul>

    <script>
      function loadUsers() {
        fetch("http://localhost:5000/users")
          .then((res) => res.json())
          .then((data) => {
            let list = document.getElementById("users");
            list.innerHTML = "";

            data.forEach((user) => {
              let li = document.createElement("li");
              li.textContent = user.name;
              list.appendChild(li);
            });
          });
      }
    </script>
  </body>
</html>
